name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (ARM64)
            runner: macos-latest
            target: aarch64-apple-darwin
            os: macos
          - name: macOS (x86_64)
            runner: macos-13
            target: x86_64-apple-darwin
            os: macos
          - name: Linux (x86_64)
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os: linux
          - name: Linux (ARM64)
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
          - name: Windows (x86_64)
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
          - name: Windows (ARM64)
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            os: windows
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Run npm tests
        run: npm test

      - name: Run FFmpeg download script
        shell: bash
        run: bash scripts/download-ffmpeg.sh

      - name: Verify FFmpeg sidecar
        shell: bash
        run: ls -la src-tauri/binaries/

      - name: Run Cargo tests
        if: ${{ !matrix.cross }}
        working-directory: src-tauri
        run: cargo test --features test-audio --target ${{ matrix.target }}

      - name: Cargo check (cross-compile)
        if: ${{ matrix.cross }}
        working-directory: src-tauri
        run: cargo check --target ${{ matrix.target }}
